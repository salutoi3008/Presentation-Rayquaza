<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rayquaza — Le Seigneur des Cieux</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="rayquaza.css">
</head>
<body>

  <header>
    <div class="stars" aria-hidden="true">
      <div class="stars-layer s1"></div>
      <div class="stars-layer s2"></div>
      <div class="stars-layer s3"></div>
    </div>

    <!-- Ligne diagonale style sillage -->
    <div class="rq-diagonal" aria-hidden="true"></div>

    <div class="header-content">
      <p class="eyebrow">Pokémon Légendaire · Génération III · #384</p>
      <h1>Ray<span class="h1-highlight">qua</span>za</h1>
      <p class="header-jp">レックウザ</p>

      <div class="header-stats">
        <div class="stat-item">
          <span class="stat-label">Type</span>
          <span class="stat-value">Dragon / Vol</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Taille</span>
          <span class="stat-value">7 m</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Poids</span>
          <span class="stat-value">206,5 kg</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">BST</span>
          <span class="stat-value">680</span>
        </div>
      </div>

      <div class="type-badges">
        <span class="badge dragon">Dragon</span>
        <span class="badge flying">Vol</span>
      </div>
    </div>

    <button id="themeToggle" aria-label="Changer de thème">🌙</button>
  </header>
